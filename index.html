<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe PRO - Rishikesh</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto}
body{margin:0;background:#0f172a;color:white;display:flex;justify-content:center}
.app{width:100%;max-width:420px;height:100vh;display:flex;flex-direction:column}
.header{padding:15px;text-align:center;background:#1e293b;font-weight:bold}
.screen{flex:1;display:none;flex-direction:column;align-items:center;padding:15px}
.screen.active{display:flex}
.card{background:#1e293b;padding:15px;border-radius:16px;width:100%}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#22c55e;color:white}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:300px;margin-top:10px}
.cell{aspect-ratio:1;background:#334155;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px}
.status{margin-top:10px}
.room{font-size:13px;color:#94a3b8}

/* CHAT */
.chat-box{margin-top:15px;width:100%}
.messages{height:150px;overflow-y:auto;background:#0f172a;padding:8px;border-radius:10px}
.msg{padding:6px 10px;margin:4px 0;border-radius:10px;max-width:70%}
.me{background:#22c55e;margin-left:auto}
.other{background:#334155;margin-right:auto}
.input-row{display:flex;margin-top:5px}
input{flex:1;padding:8px;border-radius:8px;border:none}
.send{width:80px;margin-left:5px}

.name-input{margin-bottom:10px;padding:10px;width:100%;border-radius:10px;border:none}

.online{font-size:12px;color:#22c55e;margin-top:5px}

.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:13px;
  color:#94a3b8;
}
.footer span{margin-left:6px}
</style>
</head>
<body>

<div class="app">
<div class="header">Tic Tac Toe PRO</div>

<div id="startScreen" class="screen active">
  <div class="card">
    <h3>RISHIKESH K THE CREATOR</h3>
    <input id="name" class="name-input" placeholder="Enter your name">
    <button onclick="createRoom()">Create Room</button>
    <button onclick="joinRoomPrompt()">Join Room</button>
  </div>
  <div class="footer">📷 <span>RISHIKESH_._9</span></div>
</div>

<div id="gameScreen" class="screen">
  <div class="card">
    <div class="room" id="roomIdText"></div>
    <div class="online" id="onlineStatus"></div>
    <div class="board" id="board"></div>
    <div class="status" id="status"></div>
    <button onclick="restartGame()">Restart</button>

    <div class="chat-box">
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input id="chatInput" placeholder="Message...">
        <button class="send" onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",databaseURL:"YOUR_DB_URL",projectId:"YOUR_ID"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let roomId="";
let player="";
let name="";
let board=["","","","","","","","",""];

function createRoom(){
  name=document.getElementById("name").value||"Player X";
  roomId=Math.random().toString(36).substring(2,7);
  player="X";
  db.ref("rooms/"+roomId).set({board,turn:"X",players:{X:name}});
  startGame();
}

function joinRoomPrompt(){
  const id=prompt("Enter Room ID");
  if(id){
    name=document.getElementById("name").value||"Player O";
    roomId=id;player="O";
    db.ref("rooms/"+roomId+"/players/O").set(name);
    startGame();
  }
}

function startGame(){
  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  document.getElementById("roomIdText").innerText="Room: "+roomId;

  db.ref("rooms/"+roomId).on("value",snap=>{
    const d=snap.val(); if(!d)return;
    board=d.board;
    render();

    const players=d.players||{};
    const online=Object.keys(players).length;
    document.getElementById("onlineStatus").innerText="Players online: "+online;

    document.getElementById("status").innerText=d.turn===player?"Your Turn":"Opponent Turn";
  });

  db.ref("chats/"+roomId).on("value",snap=>{
    const msgs=snap.val()||[];
    const box=document.getElementById("messages");
    box.innerHTML="";
    msgs.forEach(m=>{
      const div=document.createElement("div");
      div.className="msg "+(m.sender===player?"me":"other");
      div.innerText=m.name+": "+m.text;
      box.appendChild(div);
    });
    box.scrollTop=box.scrollHeight;
  });
}

function render(){
  const el=document.getElementById("board"); el.innerHTML="";
  board.forEach((v,i)=>{
    const c=document.createElement("div");
    c.className="cell"; c.innerText=v;
    c.onclick=()=>move(i);
    el.appendChild(c);
  });
}

function move(i){
  const ref=db.ref("rooms/"+roomId);
  ref.get().then(snap=>{
    const d=snap.val();
    if(d.board[i]!==""||d.turn!==player)return;
    d.board[i]=player;
    d.turn=player==="X"?"O":"X";
    ref.set(d);
  });
}

function restartGame(){
  db.ref("rooms/"+roomId).set({board:["","","","","","","","",""],turn:"X"});
}

function sendMessage(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim(); if(!text)return;

  const ref=db.ref("chats/"+roomId);
  ref.get().then(snap=>{
    let msgs=snap.val()||[];
    msgs.push({sender:player,name:name,text:text});
    ref.set(msgs);
  });

  input.value="";
}
</script>

</body>
</html>
